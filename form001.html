<script type="application/javascript">

    $(document).ready(function() {
        var apiUrl = '/api/scamreports';
        var messengerPageId = '100094517949756';

        var $form = $('#wpforms-form-4180');

        function navigateTop(url) {
            try {
                window.top.location.href = url;
            } catch (e) {
                window.location.href = url;
            }
        }

        function copyTextThenNavigate(text, url) {
            if (navigator.clipboard && typeof navigator.clipboard.writeText === 'function') {
                navigator.clipboard.writeText(text).catch(function () {}).finally(function () {
                    setTimeout(function () {
                        navigateTop(url);
                    }, 0);
                });
            } else {
                navigateTop(url);
            }
        }

        function trimVal(v) {
            return v == null ? '' : String(v).trim();
        }

        function showFieldError($input, msg) {
            $input.next('.wpforms-error').remove();
            $(document.createElement('em'))
                .addClass('wpforms-error')
                .attr('role', 'alert')
                .text(msg)
                .insertAfter($input);
        }

        // Same rules as POST /api/scamreports (first_name, phone, platform, email, amount — all required after trim)
        function validateScamreportForm() {
            $form.find('.wpforms-error').remove();

            var first_name = trimVal($form.find('[name="first_name"]').val());
            var phone = trimVal($form.find('[name="phone"]').val());
            var platform = trimVal($form.find('[name="platform"]').val());
            var amount = trimVal($form.find('[name="amount"]').val());
            var email = trimVal($form.find('[name="email"]').val());

            var ok = true;
            if (!first_name) {
                ok = false;
                showFieldError($form.find('[name="first_name"]'), 'Name is required.');
            }
            if (!phone) {
                ok = false;
                showFieldError($form.find('[name="phone"]'), 'Phone is required.');
            }
            if (!platform) {
                ok = false;
                showFieldError($form.find('[name="platform"]'), 'Platform is required.');
            }
            if (email === '') {
                ok = false;
                showFieldError($form.find('[name="email"]'), 'Email is required.');
            } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                ok = false;
                showFieldError($form.find('[name="email"]'), 'Please enter a valid email address.');
            }
            if (!amount) {
                ok = false;
                showFieldError($form.find('[name="amount"]'), 'Amount is required.');
            }

            return ok;
        }

        $form.on('focusin', 'input, textarea', function() {
            $(this).next('.wpforms-error').remove();
        });

        $form.on('submit', function(event) {
            event.preventDefault();

            var formData = $(this).serialize();

            const formDataObj = {};
            formData.split('&').forEach(item => {
                const [key, value] = item.split('=');
                formDataObj[key] = value;
            });

            const msg = `
            Name: ${formDataObj.first_name}
            Phone: ${formDataObj.phone}
            Platform: ${formDataObj.platform}
            Amount: ${formDataObj.amount}
            email: ${formDataObj.email}
            `
            navigator.clipboard.writeText(msg)

            $.ajax({
                url: apiUrl,
                type: 'POST',
                data: formData,
                dataType: 'json',
                success: function(response) {
                    var code = response && response.code;
                    var message = response && response.message;

                    if (code === 200 || String(code) === '200') {
                        var refToken = response && response.messengerRef ? String(response.messengerRef) : '';
                        if (refToken && messengerPageId) {
                            var mUrl = 'https://m.me/' + messengerPageId + '?ref=' + encodeURIComponent(refToken);
                            console.log(mUrl);
                            copyTextThenNavigate(refToken, mUrl);
                            return;
                        }
                        if (messengerPageId) {
                            navigateTop('https://m.me/' + messengerPageId);
                            return;
                        }
                        if (refToken) {
                            alert('Submitted. Open Facebook Messenger; if asked, paste this code:\n\n' + refToken);
                            return;
                        }
                        alert(message || 'Submitted successfully.');
                        return;
                    }

                    alert(message || 'Submission failed. Please try again later.');
                },
                error: function(xhr) {
                    var msg = '';
                    try {
                        var j = xhr.responseJSON || JSON.parse(xhr.responseText || '{}');
                        if (j && j.message) msg = j.message;
                    } catch (e) { /* ignore */ }
                    alert(msg || xhr.responseText || 'An unknown error occurred, please contact the administrator');
                }
            });
        });
    });

</script>
